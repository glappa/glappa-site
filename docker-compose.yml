services:
  glappa:
    build: .
    image: glappa:latest
    container_name: glappa
    ports:
      - "8099:80"        # Statische Seite (Index, page1, bounce, secret, home)
      - "8090:8090"      # YouTube-Downloader (app.py)
    environment:
      # yt-dlp Cookies fuer YouTube-Bot-Bypass.
      # Datei muss in ./cookies/youtube.txt liegen (Netscape-Format).
      # Existiert sie nicht, ignoriert app.py die Option automatisch -> kein Fehler.
      - YT_COOKIE_FILE=/cookies/youtube.txt
    volumes:
      - glappa-downloads:/downloads   # /file/<id>-Output ueberlebt restarts
      - ./cookies:/cookies            # Firefox-Cookies fuer yt-dlp (rw, damit yt-dlp Sessions refreshen kann)
    restart: unless-stopped
    healthcheck:
      # python ist im python:3.12-slim-Image immer da, wget nicht
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1/', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── LibreSpeed (lokal testen): http://localhost:8890 ──────────────
  # Auf dem VPS laeuft derselbe Container hinter Apache unter /speed/
  # (siehe _docker/docker-compose.vps.yml + apache/home.glappa.de.conf).
  librespeed:
    image: ghcr.io/librespeed/speedtest:latest
    container_name: glappa-librespeed
    ports:
      - "8890:8080"
    environment:
      - MODE=standalone
      - TITLE=GLAPPA Speedtest
      - TELEMETRY=false
    # Zurueck-Pfeil wie auf dem VPS (Erklaerung: _docker/docker-compose.vps.yml)
    volumes:
      - ./_docker/librespeed/glappa-back.js:/speedtest/glappa-back.js:ro
    command: ["bash", "-c", "sed -i 's#</body>#<script src=glappa-back.js></script></body>#' /speedtest/*.html && exec bash /entrypoint.sh"]
    restart: unless-stopped

volumes:
  glappa-downloads:
