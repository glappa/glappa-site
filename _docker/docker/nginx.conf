server {
    listen 80 default_server;
    server_name _;
    root /app/glappa-site;
    index index.html;
    charset utf-8;

    # Statische Seiten + Assets (Index, page1, bounce, secret, home etc.)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cursor & GIFs: kein aggressives Caching, damit Updates beim Deploy sofort durchschlagen
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache";
    }

    # MP4 / MP3 / GIF: laenger cachen (Assets bleiben stabil)
    location ~* \.(mp4|mp3|gif|png|jpe?g|ico|cur)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    client_max_body_size 10m;
}
