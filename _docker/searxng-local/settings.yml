# SearXNG-Config fuers LOKALE Testen (nicht der VPS!).
# Kopie von ../searxng/settings.yml, nur base_url + Instanzname angepasst.
# Doku: https://docs.searxng.org/admin/settings/

use_default_settings: true

general:
  instance_name: "glappa search (lokal)"
  contact_url: false
  enable_metrics: false

server:
  # Wird von run-search-local.sh automatisch generiert (openssl rand -hex 32).
  # Eigener Key, unabhaengig vom echten VPS-secret_key — betrifft nur diese
  # lokale Instanz, hat nichts mit search.glappa.de zu tun.
  secret_key: "REPLACE_ME_OPENSSL_RAND_HEX_32"

  base_url: "http://localhost:8890/"
  bind_address: "0.0.0.0"
  port: 8080

  limiter: false
  public_instance: false

  image_proxy: true
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: "de"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: dark

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "de"
  formats:
    - html
    - json
