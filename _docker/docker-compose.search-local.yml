# Lokales Test-Setup fuer die Glappa-Suche — laeuft auf JEDER Maschine mit
# Docker, unabhaengig vom VPS. Kein Apache, kein TLS, keine Domain noetig:
# SearXNG + ein schlanker nginx-Proxy (macht dieselbe Style-Injection wie
# Apache/mod_substitute auf dem VPS) laufen komplett lokal.
#
# Start:  bash run-search-local.sh          (siehe dort fuer Details)
# Stop:   bash run-search-local.sh --stop
#
# Danach: http://localhost:8890/
services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng-local
    volumes:
      - ./searxng-local/settings.yml:/etc/searxng/settings.yml:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8890/
      - INSTANCE_NAME=glappa search (lokal)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped

  # nginx statt Apache: leichter fuer den lokalen Gebrauch, macht aber
  # exakt dieselbe Aufgabe (Style-Injection + Reverse-Proxy), siehe
  # nginx-search-local.conf.
  glappa-search-proxy:
    image: nginx:alpine
    container_name: glappa-search-proxy-local
    depends_on:
      - searxng
    ports:
      - "127.0.0.1:8890:80"
    volumes:
      - ./nginx-search-local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./searxng-static:/usr/share/nginx/glappa-static:ro
    restart: unless-stopped
