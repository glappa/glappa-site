# Lokaler Ersatz fuer apache/search.glappa.de.conf.
#
# Bildet dieselbe Style-Injection nach, die auf dem VPS per Apache +
# mod_substitute passiert (siehe apache/search.glappa.de.conf), nur mit
# nginx' sub_filter statt Substitute — kein Apache, kein TLS, keine Domain
# noetig. Damit sieht die lokale Instanz optisch identisch zu
# search.glappa.de aus.
server {
    listen 80;
    server_name localhost;

    # glappa-style.css + glappa-search.js NICHT proxien, sondern lokal
    # aus dem Repo servieren (Bind-Mount, siehe docker-compose.search-local.yml).
    location = /glappa-style.css {
        alias /usr/share/nginx/glappa-static/glappa-style.css;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /glappa-search.js {
        alias /usr/share/nginx/glappa-static/glappa-search.js;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        proxy_pass http://searxng:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Entspricht den beiden Apache-"Substitute"-Zeilen fuer
        # </head> und </body> — in einem Rutsch pro Marker, damit
        # sich zwei sub_filter auf denselben String nicht gegenseitig
        # blockieren (nginx ersetzt jeden Marker nur einmal je Directive).
        sub_filter '</head>' '<link rel="stylesheet" href="/glappa-style.css"></head>';
        sub_filter '</body>' '<a id="glappa-home" href="https://home.glappa.de" title="Zurueck zu Glappa Home">&#8962; <span class="ghome-text">HOME</span></a><script defer src="/glappa-search.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
