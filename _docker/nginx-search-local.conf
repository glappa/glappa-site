# Lokaler Ersatz fuer apache/search.glappa.de.conf.
#
# Bildet dieselbe Style-Injection nach, die auf dem VPS per Apache +
# mod_substitute passiert (siehe apache/search.glappa.de.conf), nur mit
# nginx' sub_filter statt Substitute — kein Apache, kein TLS, keine Domain
# noetig. Damit sieht die lokale Instanz optisch identisch zu
# search.glappa.de aus.
server {
    listen 80;
    server_name localhost;

    # Glappa-Assets (Themes + Scripts) NICHT proxien, sondern lokal
    # aus dem Repo servieren (Bind-Mount, siehe docker-compose.search-local.yml).
    location = /glappa-style.css {
        alias /usr/share/nginx/glappa-static/glappa-style.css;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /glappa-clean.css {
        alias /usr/share/nginx/glappa-static/glappa-clean.css;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /glappa-theme.js {
        alias /usr/share/nginx/glappa-static/glappa-theme.js;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = /glappa-search.js {
        alias /usr/share/nginx/glappa-static/glappa-search.js;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        proxy_pass http://searxng:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Entspricht den beiden Apache-"Substitute"-Zeilen fuer
        # </head> und </body> — in einem Rutsch pro Marker, damit
        # sich zwei sub_filter auf denselben String nicht gegenseitig
        # blockieren (nginx ersetzt jeden Marker nur einmal je Directive).
        # Der Inline-Bootstrap MUSS identisch zu apache/search.glappa.de.conf
        # bleiben: er setzt das Theme synchron vor dem ersten Paint und
        # schreibt genau EIN Stylesheet — kein "Zwischenzustand" mehr.
        sub_filter '</head>' "<script>(function(){var m=null,q=location.search;if(q.indexOf('glappa_theme=dark')>-1){m='dark'}else if(q.indexOf('glappa_theme=light')>-1){m='light'}else if(q.indexOf('glappa_theme=retro')>-1){m='retro'}if(!m){try{m=localStorage.getItem('glappa_theme')}catch(e){}}if(m!=='dark'&&m!=='light'){m='retro'}var r=document.documentElement,n=(m==='light')?'light':'dark',cls=r.className.split(' '),out=[],i;for(i=0;i<cls.length;i++){if(cls[i]&&cls[i].indexOf('theme-')!==0&&cls[i].indexOf('theme_')!==0){out.push(cls[i])}}out.push('theme-'+n,'theme_'+n);r.className=out.join(' ');r.setAttribute('data-glappa-theme',m);r.style.colorScheme=n;var re=(m==='retro');document.write('<link id=glappa-css-'+(re?'retro':'clean')+' rel=stylesheet href=/glappa-'+(re?'style':'clean')+'.css>')})();</script><noscript><link id='glappa-css-retro' rel='stylesheet' href='/glappa-style.css'></noscript><script defer src='/glappa-theme.js'></script></head>";
        sub_filter '</body>' '<a id="glappa-home" href="https://home.glappa.de" title="Zurueck zu Glappa Home">&#8962; <span class="ghome-text">HOME</span></a><script defer src="/glappa-search.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
