# Apache vhost fuer home.glappa.de
#
# DocumentRoot ist direkt das Repo unter ~/glappa-site/ — d.h. `git pull`
# auf dem VPS ist gleichzeitig deploy. Kein zweites Sync mehr noetig.
#
# Architektur:
#   :80   → ACME-Challenge + redirect zu HTTPS
#   :443  → statisches Hosting aus /home/glappa/glappa-site/
#   :8080 → unangetastet (Flask app.py / YouTube-Downloader mit eigenem TLS)
#
# Cert: dasselbe Letsencrypt-Cert das schon fuer app.py:8080 verwendet wird,
# liegt unter /etc/letsencrypt/live/home.glappa.de/.

<VirtualHost *:80>
    ServerName home.glappa.de

    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory "/var/www/html/.well-known/acme-challenge/">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteRule ^/?(.*)$ https://%{SERVER_NAME}/$1 [L,R=301]

    ErrorLog ${APACHE_LOG_DIR}/home.glappa.de-error.log
    CustomLog ${APACHE_LOG_DIR}/home.glappa.de-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName home.glappa.de
    DocumentRoot /home/glappa/glappa-site
    DirectoryIndex index.html

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/home.glappa.de/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/home.glappa.de/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    <Directory /home/glappa/glappa-site>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Private Ordner: NICHT ausliefern.
    # _docker/    — Docker/Apache configs + Secrets
    # .git/       — Repo-Internals
    # .claude/    — lokale Editor-Configs
    # home/cookies/ — YouTube-Cookies
    <DirectoryMatch "^/home/glappa/glappa-site/(_docker|\.git|\.claude|home/cookies)">
        Require all denied
    </DirectoryMatch>

    # Cache-Verhalten wie nginx auf glappa.de:
    # HTML/CSS/JS: no-cache (Updates sofort sichtbar)
    # Assets: 7 Tage Cache
    <FilesMatch "\.(html|js|css)$">
        Header set Cache-Control "no-cache"
    </FilesMatch>
    <IfModule mod_expires.c>
        ExpiresActive On
        <FilesMatch "\.(mp4|mp3|gif|png|jpe?g|ico|cur|webp|svg)$">
            ExpiresDefault "access plus 7 days"
            Header append Cache-Control "public, max-age=604800"
        </FilesMatch>
    </IfModule>

    # Security-Header
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    ErrorLog ${APACHE_LOG_DIR}/home.glappa.de-error.log
    CustomLog ${APACHE_LOG_DIR}/home.glappa.de-access.log combined
</VirtualHost>
</IfModule>
