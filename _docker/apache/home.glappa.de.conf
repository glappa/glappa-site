# Apache vhost fuer home.glappa.de
#
# DocumentRoot ist direkt das Repo unter ~/glappa-site/ — d.h. `git pull`
# auf dem VPS ist gleichzeitig deploy. Kein zweites Sync mehr noetig.
#
# Architektur:
#   :80   → ACME-Challenge + redirect zu HTTPS
#   :443  → statisches Hosting aus /home/glappa/glappa-site/
#   :8080 → unangetastet (Flask app.py / YouTube-Downloader mit eigenem TLS)
#
# Cert: dasselbe Letsencrypt-Cert das schon fuer app.py:8080 verwendet wird,
# liegt unter /etc/letsencrypt/live/home.glappa.de/.

<VirtualHost *:80>
    ServerName home.glappa.de

    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory "/var/www/html/.well-known/acme-challenge/">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteRule ^/?(.*)$ https://%{SERVER_NAME}/$1 [L,R=301]

    ErrorLog ${APACHE_LOG_DIR}/home.glappa.de-error.log
    CustomLog ${APACHE_LOG_DIR}/home.glappa.de-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName home.glappa.de
    DocumentRoot /home/glappa/glappa-site
    DirectoryIndex index.html

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/home.glappa.de/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/home.glappa.de/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # ── Counter-API: SAME-ORIGIN Proxy zu app.py auf :8080 ──────────
    # Browser auf home.glappa.de fetchen /api/counter/... — same-origin,
    # also KEIN CORS und ein First-Party-Cookie (funktioniert auch wenn
    # der Browser Third-Party-Cookies blockt). Apache leitet intern an
    # die Flask-app.py weiter, die auf 127.0.0.1:8080 mit eigenem TLS
    # lauscht. MUSS vor dem statischen DocumentRoot greifen (Location tut das).
    ProxyRequests        Off
    ProxyPreserveHost    On
    SSLProxyEngine       on
    SSLProxyVerify       none
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerCN  off
    <Location "/api/counter/">
        ProxyPass         "https://127.0.0.1:8080/counter/" retry=0 timeout=10
        ProxyPassReverse  "https://127.0.0.1:8080/counter/"
    </Location>

    # ── Glappa-Chat: terminal.html `glappa-chat` -> app.py /chat -> Ollama ──
    # Timeout bewusst hoch: CPU-Inferenz + erstes Modell-Laden dauern.
    <Location "/api/chat">
        ProxyPass         "https://127.0.0.1:8080/chat" retry=0 timeout=180
        ProxyPassReverse  "https://127.0.0.1:8080/chat"
    </Location>

    # ── GLAPPA-KI-Werkzeuge: werkzeuge.html -> app.py /ki -> Ollama ──
    # Gleicher hoher Timeout wie /api/chat: CPU-Inferenz, und eine lange
    # Uebersetzung streamt schonmal ein paar Minuten.
    <Location "/api/ki">
        ProxyPass         "https://127.0.0.1:8080/ki" retry=0 timeout=180
        ProxyPassReverse  "https://127.0.0.1:8080/ki"
    </Location>

    # ── Link-Kuerzer: werkzeuge.html ──
    # /api/short  = erstellen (POST, JSON)
    # /s/<code>   = aufloesen (302-Redirect aus app.py)
    <Location "/api/short">
        ProxyPass         "https://127.0.0.1:8080/short" retry=0 timeout=10
        ProxyPassReverse  "https://127.0.0.1:8080/short"
    </Location>
    <Location "/s/">
        ProxyPass         "https://127.0.0.1:8080/short/" retry=0 timeout=10
        ProxyPassReverse  "https://127.0.0.1:8080/short/"
    </Location>

    # ── PGP-Chat: home/pgp.html — Ende-zu-Ende verschluesselt, der Server
    # (app.py /pgp/*) speichert nur Public Keys + Ciphertext-Blobs.
    <Location "/api/pgp/">
        ProxyPass         "https://127.0.0.1:8080/pgp/" retry=0 timeout=30
        ProxyPassReverse  "https://127.0.0.1:8080/pgp/"
    </Location>

    # ── LibreSpeed: Speedtest-Container (docker-compose.vps.yml, nur
    # 127.0.0.1:8890). Trailing-Slash-Redirect zuerst, sonst laufen die
    # relativen Asset-Pfade (speedtest.js, backend/...) ins Leere.
    RedirectMatch ^/speed$ /speed/
    <Location "/speed/">
        ProxyPass         "http://127.0.0.1:8890/" retry=0 timeout=120
        ProxyPassReverse  "http://127.0.0.1:8890/"
    </Location>

    # ── Echte Shell: terminal.html/shell.html "real-shell" -> shellgate ──
    # WebSocket-Upgrade braucht mod_proxy_wstunnel (einmalig aktivieren:
    # `a2enmod proxy_wstunnel && systemctl reload apache2`). shellgate
    # laeuft NUR auf localhost (docker-compose.vps.yml: 127.0.0.1:8765) —
    # von aussen ist es ausschliesslich ueber dieses TLS-Location erreichbar.
    # Timeout hoch: eine Shell-Sitzung soll nicht nach ein paar Minuten
    # Inaktivitaet vom Proxy gekappt werden — server.py hat sein eigenes,
    # kuerzeres Idle-Timeout (SHELL_IDLE_TIMEOUT), das greift zuerst.
    <Location "/api/shell/ws">
        ProxyPass         "ws://127.0.0.1:8765/" retry=0 timeout=3600
        ProxyPassReverse  "ws://127.0.0.1:8765/"
    </Location>

    # ── GUI-Anzeige der Gast-VM: terminal.html/desktop.html "desktop-boot"
    # -> displaygate ── siehe displaygate/server.py fuer die Architektur
    # (Ticket-Auth statt Passwort direkt in der WS-URL — das Passwort selbst
    # taucht dadurch NIE in diesem Access-Log auf, nur ein 30s gueltiges,
    # einmaliges Ticket). vnc-auth ist ein normaler HTTP-POST (kein Upgrade),
    # vnc selbst ist die eigentliche WebSocket-Verbindung (proxy_wstunnel,
    # wie /api/shell/ws oben).
    <Location "/api/shell/vnc-auth">
        ProxyPass         "http://127.0.0.1:8767/auth" retry=0 timeout=10
        ProxyPassReverse  "http://127.0.0.1:8767/auth"
    </Location>
    <Location "/api/shell/vnc">
        ProxyPass         "ws://127.0.0.1:8766/" retry=0 timeout=3600
        ProxyPassReverse  "ws://127.0.0.1:8766/"
    </Location>

    <Directory /home/glappa/glappa-site>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Private Ordner: NICHT ausliefern.
    # _docker/    — Docker/Apache configs + Secrets
    # .git/       — Repo-Internals
    # .claude/    — lokale Editor-Configs
    # home/cookies/ — YouTube-Cookies
    <DirectoryMatch "^/home/glappa/glappa-site/(_docker|\.git|\.claude|home/cookies)">
        Require all denied
    </DirectoryMatch>

    # Defense-in-depth gegen die uebliche Scanner-Bot-Sucherei (.env, .git/config,
    # aws.env usw.) und gegen Repo-Tooling, das im DocumentRoot rumliegt aber
    # niemals oeffentlich sein sollte (docker-compose*.yml, restart.sh, Dockerfile,
    # requirements.txt). Alles per Dateiname, nicht Pfad — greift ueberall im Root.
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
    <FilesMatch "\.(ya?ml|sh|env)$">
        Require all denied
    </FilesMatch>
    <Files "Dockerfile">
        Require all denied
    </Files>
    <Files "requirements.txt">
        Require all denied
    </Files>

    # Cache-Verhalten wie nginx auf glappa.de:
    # HTML/CSS/JS: no-cache (Updates sofort sichtbar)
    # Assets: 7 Tage Cache
    <FilesMatch "\.(html|js|css)$">
        Header set Cache-Control "no-cache"
    </FilesMatch>
    <IfModule mod_expires.c>
        ExpiresActive On
        <FilesMatch "\.(mp4|mp3|gif|png|jpe?g|ico|cur|webp|svg)$">
            ExpiresDefault "access plus 7 days"
            Header append Cache-Control "public, max-age=604800"
        </FilesMatch>
    </IfModule>

    # Security-Header
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    # PGP-Chat: bewusst KEIN Access-Log fuer /api/pgp/ — Anonymitaet heisst
    # auch: es darf hinterher nicht rekonstruierbar sein, wer (IP) wann
    # gechattet hat. Der Klartext-Raumname erreicht den Server ohnehin nie
    # (Client schickt nur einen Hash, alles als POST-Body).
    SetEnvIf Request_URI "^/api/pgp/" pgp_dontlog
    ErrorLog ${APACHE_LOG_DIR}/home.glappa.de-error.log
    CustomLog ${APACHE_LOG_DIR}/home.glappa.de-access.log combined env=!pgp_dontlog
</VirtualHost>
</IfModule>
