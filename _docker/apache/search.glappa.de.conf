# Apache vhost fuer search.glappa.de
#
# Architektur:
#   Internet ── :80/:443 ── Apache (Reverse-Proxy + TLS)
#                            │
#                            ├── andere bestehende vhosts (unangetastet)
#                            │
#                            └── search.glappa.de ─→ 127.0.0.1:8888
#                                                    └─ SearXNG Docker-Container
#
# Cert kommt von certbot (Letsencrypt) via webroot-Plugin.
# Wird von setup-search-apache.sh installiert + aktiviert.

# ── :80 — ACME-Challenge servieren + Rest auf HTTPS redirecten ─────
<VirtualHost *:80>
    ServerName search.glappa.de

    # ACME-Challenge unmaskiert (HTTP-01 / webroot)
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory "/var/www/html/.well-known/acme-challenge/">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Alles andere -> HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/
    RewriteRule ^/?(.*)$ https://%{SERVER_NAME}/$1 [L,R=301]

    ErrorLog ${APACHE_LOG_DIR}/search.glappa.de-error.log
    CustomLog ${APACHE_LOG_DIR}/search.glappa.de-access.log combined
</VirtualHost>

# ── :443 — TLS + Reverse-Proxy auf SearXNG ─────────────────────────
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName search.glappa.de

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/search.glappa.de/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/search.glappa.de/privkey.pem
    # certbot legt diese Datei beim Install an
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Reverse-Proxy zu SearXNG (Docker-Container, gebunden auf 127.0.0.1:8888)
    ProxyPreserveHost  On
    ProxyRequests      Off

    # ── Counter-API: zur lokalen YouTube-App auf :8080 (eigenes TLS) ──
    # Browser fetchen https://search.glappa.de/api/counter/visit (Standard-Port
    # 443, kommt durch jede Firewall). Apache leitet intern an die app.py
    # weiter, die auf 127.0.0.1:8080 mit eigenem Letsencrypt-Cert lauscht.
    # MUSS vor dem allgemeinen ProxyPass / stehen!
    SSLProxyEngine        on
    SSLProxyVerify        none
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerCN   off

    <Location "/api/counter/">
        ProxyPass         "https://127.0.0.1:8080/counter/" retry=0 timeout=10
        ProxyPassReverse  "https://127.0.0.1:8080/counter/"
        # app.py CORS-Logik nutzt den Origin-Header, der bleibt erhalten.
    </Location>

    # ── Glappa-Style Override fuer SearXNG ────────────────────────────
    # Statische Glappa-Assets lokal bereitstellen (nicht proxien):
    #   glappa-style.css  90er-Retro-Theme (Default)
    #   glappa-clean.css  cleane Themes (Dunkel + Hell)
    #   glappa-theme.js   Design-Umschalter (localStorage) + Panel auf /preferences
    #   glappa-search.js  Dateiformat-Filter fuer die Bilder-Suche
    Alias /glappa-style.css /var/www/search-static/glappa-style.css
    Alias /glappa-clean.css /var/www/search-static/glappa-clean.css
    Alias /glappa-theme.js  /var/www/search-static/glappa-theme.js
    Alias /glappa-search.js /var/www/search-static/glappa-search.js
    <Directory "/var/www/search-static">
        Options None
        AllowOverride None
        Require all granted
        # no-cache: Browser MUSS die CSS bei jedem Laden revalidieren, damit
        # Deploys sofort sichtbar sind (sonst bis zu 5 Min alte CSS im Cache).
        Header set Cache-Control "no-cache, must-revalidate"
    </Directory>

    # mod_substitute: injiziert unsere CSS in jede HTML-Response von SearXNG.
    # Substitution greift NACH dem proxy_pass, vor dem Senden an den Client.
    # FilterDeclare/FilterChain ist optional; AddOutputFilterByType reicht.
    AddOutputFilterByType INFLATE;SUBSTITUTE;DEFLATE text/html
    # INLINE-Bootstrap (Fix "Zwischenzustand" 2026-07-15): liest localStorage
    # synchron VOR dem ersten Paint und schreibt GENAU EIN Stylesheet-<link>
    # (Retro ODER Clean) per document.write — kein Netz-Roundtrip, kein
    # Umschalt-Moment, in dem beide Sheets aktiv sind. Frueher waren immer
    # beide verlinkt und ein EXTERNES Script schaltete um; kam es langsam an,
    # renderte die Seite gemischt (Retro-Layout + Dark-Farben). Zusaetzlich
    # setzt der Bootstrap html[data-glappa-theme] + die nativen theme-Klassen.
    # Ohne JavaScript laedt der <noscript>-Fallback Retro (Default).
    # glappa-theme.js (defer, unkritisch) baut nur noch den Umschalter in die
    # Einstellungen und schaltet bei Wechsel live um.
    # WICHTIG: Zeile muss mit nginx-search-local.conf synchron bleiben!
    Substitute "s|</head>|<script>(function(){var m=null,q=location.search;if(q.indexOf('glappa_theme=dark')>-1){m='dark'}else if(q.indexOf('glappa_theme=light')>-1){m='light'}else if(q.indexOf('glappa_theme=retro')>-1){m='retro'}if(!m){try{m=localStorage.getItem('glappa_theme')}catch(e){}}if(m!=='dark'&&m!=='light'){m='retro'}var r=document.documentElement,n=(m==='light')?'light':'dark',cls=r.className.split(' '),out=[],i;for(i=0;i<cls.length;i++){if(cls[i]&&cls[i].indexOf('theme-')!==0&&cls[i].indexOf('theme_')!==0){out.push(cls[i])}}out.push('theme-'+n,'theme_'+n);r.className=out.join(' ');r.setAttribute('data-glappa-theme',m);r.style.colorScheme=n;var re=(m==='retro');document.write('<link id=glappa-css-'+(re?'retro':'clean')+' rel=stylesheet href=/glappa-'+(re?'style':'clean')+'.css>')})();</script><noscript><link id='glappa-css-retro' rel='stylesheet' href='/glappa-style.css'></noscript><script defer src='/glappa-theme.js'></script></head>|in"
    # Kleiner "Zurueck zu Glappa Home"-Button (oben links, per CSS gestylt).
    Substitute "s|</body>|<a id='glappa-home' href='https://home.glappa.de' title='Zurueck zu Glappa Home'>&#8962; <span class='ghome-text'>HOME</span></a></body>|in"
    # Dateiformat-Filter fuer die Bilder-Suche (client-seitig, siehe JS-Datei).
    Substitute "s|</body>|<script defer src='/glappa-search.js'></script></body>|in"

    # WebSocket-Fallback (SearXNG nutzt's nicht, schadet aber nicht)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://127.0.0.1:8888/$1  [P,L]

    # SearXNG-Proxy (default — alles was nicht /api/counter/ oder ein
    # statisches Glappa-Asset ist)
    ProxyPass        /api/counter/      !
    ProxyPass        /glappa-style.css  !
    ProxyPass        /glappa-clean.css  !
    ProxyPass        /glappa-theme.js   !
    ProxyPass        /glappa-search.js  !
    ProxyPass        / http://127.0.0.1:8888/ retry=0 timeout=30
    ProxyPassReverse / http://127.0.0.1:8888/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s

    # Security-Header (SearXNG setzt die meisten selbst, doppelt schadet nicht)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "no-referrer"

    ErrorLog ${APACHE_LOG_DIR}/search.glappa.de-error.log
    CustomLog ${APACHE_LOG_DIR}/search.glappa.de-access.log combined
</VirtualHost>
</IfModule>
