# VPS-spezifische Compose-Config — ersetzt den alten youtube-downloader.service
# Unterschiede zu docker-compose.yml (Dev):
#  - Port 8080 (wie alte app.py), nicht 8090
#  - python app.py direkt statt supervisord+gunicorn -> nutzt app.pys built-in SSL
#  - /etc/letsencrypt vom Host als :ro gemountet -> selbe Certs wie vorher
#  - kein nginx (statische Seiten leben beim Webhoster auf glappa.de)
services:
  glappa:
    build:
      context: ..                    # Projektroot (glappa-site/), nicht _docker/
      dockerfile: _docker/Dockerfile
    image: glappa:latest
    container_name: glappa
    ports:
      - "8080:8080"
    environment:
      - YT_COOKIE_FILE=/cookies/youtube.txt
      - DOWNLOADER_HOST=0.0.0.0
      - DOWNLOADER_PORT=8080
      # Glappa-Chat (terminal.html `glappa-chat`): app.py proxied /chat an Ollama
      - OLLAMA_URL=http://ollama:11434
      # Zwei Modelle: simple Prompts -> FAST (schnelle Antwort), komplexe
      # Prompts (Code/Erklaerungen/lange Nachrichten) -> SMART. app.py waehlt
      # das passende Modell per Heuristik (siehe _chat_pick_model).
      - GLAPPA_CHAT_MODEL=qwen2.5:14b
      - GLAPPA_CHAT_MODEL_FAST=qwen3:4b-instruct-2507-q4_K_M
      # Web-Suche fuer den Chat: interner Container-Weg zu SearXNG (nicht der
      # oeffentliche search.glappa.de-Weg ueber Apache). Kein API-Key, kein Tracking.
      - SEARXNG_URL=http://searxng:8080
    depends_on:
      - ollama
      - searxng
    volumes:
      - glappa-downloads:/downloads
      - ./cookies:/cookies
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    # app.py mit eingebauter SSL-Logik statt der gunicorn-Plain-Variante.
    # Findet die Letsencrypt-Certs unter /etc/letsencrypt/live/home.glappa.de/
    # automatisch (try/except in app.py) und faehrt damit auf :8080 HTTPS hoch.
    command: ["/usr/bin/tini", "--", "python", "/app/glappa-site/home/app.py"]

  # ── SearXNG: Meta-Suchmaschine ─────────────────────────────────────
  # Container hoert intern auf 8080 und wird auf 127.0.0.1:8888 vom Host
  # gemappt — von dort proxied Apache (vhost search.glappa.de.conf) weiter.
  # NICHT auf 0.0.0.0 binden, damit nichts direkt aus dem Internet auf
  # die SearXNG-Instanz zugreifen kann.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://search.glappa.de/
      - INSTANCE_NAME=glappa-search
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  # ── Ollama: LLMs fuer den glappa-chat im Terminal ─────────────────
  # Kein ports:-Mapping — nur intern vom glappa-Container erreichbar
  # (app.py /chat proxied dahin, Apache proxied /api/chat zu app.py).
  # Zwei Modelle werden gezogen (siehe setup-home-apache.sh):
  #   docker exec glappa-ollama ollama pull qwen2.5:14b                  (SMART, ~9 GB RAM)
  #   docker exec glappa-ollama ollama pull qwen3:4b-instruct-2507-q4_K_M (FAST, ~3 GB RAM)
  # Zusammen ~12 GB — passt bei 24 GB VPS-RAM minus ~5 GB fuer
  # System/glappa.de/SearXNG bequem. OLLAMA_MAX_LOADED_MODELS=2, damit BEIDE
  # gleichzeitig im RAM bleiben duerfen -> kein Modell-Swap-Overhead, wenn
  # app.py je nach Prompt-Komplexitaet zwischen ihnen hin- und herschaltet.
  # Das alte FAST-Modell qwen2.5:7b kann nach dem Deploy geloescht werden:
  #   docker exec glappa-ollama ollama rm qwen2.5:7b   (~5 GB Disk frei)
  ollama:
    image: ollama/ollama:latest
    container_name: glappa-ollama
    environment:
      - OLLAMA_KEEP_ALIVE=30m        # nur Fallback — app.py pinnt BEIDE Modelle
                                     # per Request-keep_alive 24h im RAM (der
                                     # 14b-Kaltstart war der groesste Latenz-
                                     # Posten, s. /chat in home/app.py)
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_CONTEXT_LENGTH=4096
    volumes:
      - ollama-models:/root/.ollama  # Modelle ueberleben Restarts
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  # ── Gast-Image glappa-shellvm:latest + Egress-Image glappa-shell-egress ──
  # ABSICHTLICH KEIN Compose-Service: ein Service mit `profiles:` wird von
  # `docker compose build` UEBERSPRUNGEN (Profil inaktiv), das Image
  # entstuende also nie und shellgate scheiterte zur Laufzeit mit
  # ImageNotFound. Deshalb baut restart.sh beide Images direkt:
  #   build_shell_guest_image  -> glappa-shellvm:latest     (_docker/shellvm)
  #   build_shell_egress_image -> glappa-shell-egress:latest (_docker/shell-egress)
  # shellgate (unten) erzeugt daraus den dauerhaften Gast + Egress-Proxy und
  # haengt den Gast an ein INTERNES Netz ohne Internet — Ausgang nur ueber den
  # Proxy (Tor/DoH, Anti-Tracking). Siehe shellgate/server.py + shell-egress/.

  # ── shellgate: passwortgeschuetzte ECHTE Ubuntu-Shell im Browser ──
  # terminal.html "real-shell" -> Apache /api/shell/ws -> hier. Siehe
  # shellgate/server.py fuer die volle Architektur-Begruendung (eigener
  # Dienst, eigenes Docker-Netz, Ressourcen-/Capability-Limits pro
  # Gast-Container).
  #
  # docker.sock ist NUR HIER gemountet — bewusst NICHT im Haupt-
  # "glappa"-Container, der oeffentliche URLs verarbeitet (yt-dlp).
  #
  # SHELL_PASSWORD_HASH kommt aus _docker/.env (siehe .env.example) —
  # NIEMALS das Klartext-Passwort committen, nur den SHA-256-Hash.
  shellgate:
    build:
      context: shellgate
    image: glappa-shellgate:latest
    container_name: glappa-shellgate
    ports:
      # NUR localhost — von aussen ausschliesslich ueber Apache (TLS +
      # Reverse-Proxy), genau wie searxng auf 127.0.0.1:8888.
      - "127.0.0.1:8765:8765"
    environment:
      - SHELL_PASSWORD_HASH=${SHELL_PASSWORD_HASH}
      - SHELL_IMAGE=glappa-shellvm:latest
      # Egress-Proxy-Image (Tor+privoxy+dnscrypt). shellgate zieht daraus den
      # dauerhaften Proxy hoch und bindet den Gast per internem Netz nur an
      # ihn. Defaults stehen in server.py; hier nur zur Auffindbarkeit.
      - SHELL_EGRESS_IMAGE=glappa-shell-egress:latest
      - SHELL_IDLE_TIMEOUT=1800
      - SHELL_MAX_SESSIONS=5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "3"

volumes:
  glappa-downloads:
  ollama-models:
