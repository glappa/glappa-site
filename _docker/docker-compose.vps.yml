# VPS-spezifische Compose-Config — ersetzt den alten youtube-downloader.service
# Unterschiede zu docker-compose.yml (Dev):
#  - Port 8080 (wie alte app.py), nicht 8090
#  - python app.py direkt statt supervisord+gunicorn -> nutzt app.pys built-in SSL
#  - /etc/letsencrypt vom Host als :ro gemountet -> selbe Certs wie vorher
#  - kein nginx (statische Seiten leben beim Webhoster auf glappa.de)
services:
  glappa:
    build:
      context: ..                    # Projektroot (glappa-site/), nicht _docker/
      dockerfile: _docker/Dockerfile
    image: glappa:latest
    container_name: glappa
    ports:
      - "8080:8080"
    environment:
      - YT_COOKIE_FILE=/cookies/youtube.txt
      - DOWNLOADER_HOST=0.0.0.0
      - DOWNLOADER_PORT=8080
      # Glappa-Chat (terminal.html `glappa-chat`): app.py proxied /chat an Ollama
      - OLLAMA_URL=http://ollama:11434
      - GLAPPA_CHAT_MODEL=qwen2.5:14b
      # Web-Suche fuer den Chat: interner Container-Weg zu SearXNG (nicht der
      # oeffentliche search.glappa.de-Weg ueber Apache). Kein API-Key, kein Tracking.
      - SEARXNG_URL=http://searxng:8080
    depends_on:
      - ollama
      - searxng
    volumes:
      - glappa-downloads:/downloads
      - ./cookies:/cookies
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    # app.py mit eingebauter SSL-Logik statt der gunicorn-Plain-Variante.
    # Findet die Letsencrypt-Certs unter /etc/letsencrypt/live/home.glappa.de/
    # automatisch (try/except in app.py) und faehrt damit auf :8080 HTTPS hoch.
    command: ["/usr/bin/tini", "--", "python", "/app/glappa-site/home/app.py"]

  # ── SearXNG: Meta-Suchmaschine ─────────────────────────────────────
  # Container hoert intern auf 8080 und wird auf 127.0.0.1:8888 vom Host
  # gemappt — von dort proxied Apache (vhost search.glappa.de.conf) weiter.
  # NICHT auf 0.0.0.0 binden, damit nichts direkt aus dem Internet auf
  # die SearXNG-Instanz zugreifen kann.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://search.glappa.de/
      - INSTANCE_NAME=glappa-search
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  # ── Ollama: kleines LLM fuer den glappa-chat im Terminal ──────────
  # Kein ports:-Mapping — nur intern vom glappa-Container erreichbar
  # (app.py /chat proxied dahin, Apache proxied /api/chat zu app.py).
  # Modell wird beim Deploy gezogen: docker exec glappa-ollama ollama pull qwen2.5:14b
  # qwen2.5:14b braucht ~9 GB RAM (CPU-Inferenz, q4_K_M) — passt bei 24 GB VPS-RAM
  # minus ~5 GB fuer System/glappa.de/SearXNG bequem. Deutlich schlauer als 1.5b
  # (kohaerentere Antworten, folgt Instruktionen besser), aber langsamer pro Token.
  # Zu wenig RAM/CPU-Power auf der VPS? -> GLAPPA_CHAT_MODEL=qwen2.5:7b (~5 GB,
  # schneller) oder qwen2.5:1.5b (~2 GB) setzen und das entsprechend pullen.
  ollama:
    image: ollama/ollama:latest
    container_name: glappa-ollama
    environment:
      - OLLAMA_KEEP_ALIVE=30m        # Modell nach Idle wieder aus dem RAM werfen
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_CONTEXT_LENGTH=4096
    volumes:
      - ollama-models:/root/.ollama  # Modelle ueberleben Restarts
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

volumes:
  glappa-downloads:
  ollama-models:
