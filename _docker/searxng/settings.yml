# SearXNG-Config fuer search.glappa.de
# Doku: https://docs.searxng.org/admin/settings/

use_default_settings: true

general:
  instance_name: "glappa search"
  contact_url: false
  enable_metrics: false

server:
  # WICHTIG: vor dem ersten Start ersetzen mit:
  #   openssl rand -hex 32
  # ...und das Ergebnis hier eintragen.
  secret_key: "REPLACE_ME_OPENSSL_RAND_HEX_32"

  # Hinter Caddy laeuft alles unverschluesselt zwischen Caddy <-> searxng-Container,
  # nach aussen ist es HTTPS via Caddy.
  base_url: "https://search.glappa.de/"
  bind_address: "0.0.0.0"
  port: 8080

  # Rate-Limiter braucht Redis. Aus, weil wir nur ein paar Nutzer haben.
  limiter: false
  public_instance: false

  image_proxy: true
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: "de"
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: dark

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "de"
  formats:
    - html
    - json
